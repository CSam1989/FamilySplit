name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: false   # never cancel mid-run on a direct push — let it finish

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. BUILD — restore + compile all projects in Release
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore FamilySplit.slnx

      - name: Build (Release)
        run: dotnet build FamilySplit.slnx --no-restore -c Release

      # Cache the build output so test jobs don't rebuild from scratch
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. UNIT TESTS
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: |
          find . -path "*/bin/Release/net10.0/*" -type f \
            ! -name "*.dll" ! -name "*.pdb" ! -name "*.json" ! -name "*.xml" \
            ! -name "*.config" ! -name "*.runtimeconfig.*" ! -name "*.deps.*" \
            -exec chmod +x {} \;

      - name: Run unit tests
        run: |
          dotnet test tests/FamilySplit.UnitTests/FamilySplit.UnitTests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: "**/unit-results.trx"
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: "**/coverage.cobertura.xml"
          retention-days: 7

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both
          thresholds: "60 80"       # warn at 60%, fail at <60%

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. INTEGRATION TESTS — real Postgres (Neon dev branch)
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: false                      # temporarily disabled
    environment: ci                # protects the Neon dev secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: |
          find . -path "*/bin/Release/net10.0/*" -type f \
            ! -name "*.dll" ! -name "*.pdb" ! -name "*.json" ! -name "*.xml" \
            ! -name "*.config" ! -name "*.runtimeconfig.*" ! -name "*.deps.*" \
            -exec chmod +x {} \;

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_DEV_DATABASE_URL }}
        run: |
          dotnet tool restore
          dotnet ef database update \
            --project src/FamilySplit.Infrastructure \
            --startup-project src/FamilySplit.Api \
            --no-build

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_DEV_DATABASE_URL }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY_CI }}
        run: |
          dotnet test tests/FamilySplit.IntegrationTests/FamilySplit.IntegrationTests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: "**/integration-results.trx"
          reporter: dotnet-trx

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. SAST — CodeQL static analysis
  # ─────────────────────────────────────────────────────────────────────────────
