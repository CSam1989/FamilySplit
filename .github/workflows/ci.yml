name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: false   # never cancel mid-run on a direct push — let it finish

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. BUILD — restore + compile all projects in Release
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore FamilySplit.slnx

      - name: Build (Release)
        run: dotnet build FamilySplit.slnx --no-restore -c Release

      # Cache the build output so test jobs don't rebuild from scratch
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SERVER UNIT TESTS — pure logic: calculators, validators, business guards
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: |
          find . -path "*/bin/Release/net10.0/*" -type f \
            ! -name "*.dll" ! -name "*.pdb" ! -name "*.json" ! -name "*.xml" \
            ! -name "*.config" ! -name "*.runtimeconfig.*" ! -name "*.deps.*" \
            -exec chmod +x {} \;

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Run unit tests with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test tests/FamilySplit.UnitTests/FamilySplit.UnitTests.csproj \
              --no-build \
              -c Release \
              --logger trx;LogFileName=unit-results.trx \
              --logger console;verbosity=normal \
              --results-directory ./coverage" \
            -f cobertura \
            -o ./coverage/coverage.cobertura.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Server Unit Test Results
          path: "**/unit-results.trx"
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 7

      - name: Coverage summary
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. CLIENT UNIT TESTS — Blazor store reducers/effects + service clients
  # ─────────────────────────────────────────────────────────────────────────────
  client-unit-tests:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: |
          find . -path "*/bin/Release/net10.0/*" -type f \
            ! -name "*.dll" ! -name "*.pdb" ! -name "*.json" ! -name "*.xml" \
            ! -name "*.config" ! -name "*.runtimeconfig.*" ! -name "*.deps.*" \
            -exec chmod +x {} \;

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Run client unit tests with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test tests/FamilySplit.Client.UnitTests/FamilySplit.Client.UnitTests.csproj \
              --no-build \
              -c Release \
              --logger trx;LogFileName=client-unit-results.trx \
              --logger console;verbosity=normal \
              --results-directory ./client-coverage" \
            -f cobertura \
            -o ./client-coverage/coverage.cobertura.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Client Unit Test Results
          path: "**/client-unit-results.trx"
          reporter: dotnet-trx

      - name: Upload client coverage report
        uses: actions/upload-artifact@v4
        with:
          name: client-unit-coverage
          path: client-coverage/
          retention-days: 7

      - name: Coverage summary
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"client-coverage/**/coverage.cobertura.xml" \
            -targetdir:"client-coverage/report" \
            -reporttypes:"MarkdownSummaryGithub"
          cat client-coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. INTEGRATION TESTS — Testcontainers spins up postgres:16-alpine in-process.
  #    No external DB secret needed. Docker is available on ubuntu-latest.
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: |
          find . -path "*/bin/Release/net10.0/*" -type f \
            ! -name "*.dll" ! -name "*.pdb" ! -name "*.json" ! -name "*.xml" \
            ! -name "*.config" ! -name "*.runtimeconfig.*" ! -name "*.deps.*" \
            -exec chmod +x {} \;

      # Testcontainers manages Postgres entirely — no migrations step, no secrets.
      # The harness applies EF migrations inside PostgresContainerFixture.InitializeAsync.
      - name: Run integration tests
        run: |
          dotnet test tests/FamilySplit.IntegrationTests/FamilySplit.IntegrationTests.csproj \
            --no-build \
            -c Release \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-results.trx" \
            --logger "console;verbosity=normal"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: "**/integration-results.trx"
          reporter: dotnet-trx

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. E2E TESTS — Playwright + Testcontainers
  #
  # How it works:
  #   1. Publish the Blazor WASM client so the static file server has something to serve.
  #   2. Install Playwright's Chromium browser.
  #   3. Run the E2E suite.  E2EApiServer starts a Postgres container and the API
  #      subprocess automatically; E2EClientServer serves the published wwwroot in-process.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      # Publish the Blazor WASM client so E2EClientServer can serve it.
      - name: Publish Blazor WASM client
        run: |
          dotnet publish src/FamilySplit.Client/FamilySplit.Client.csproj \
            --no-build -c Release \
            -o /tmp/fs-client-publish

      # Install the Playwright browser binaries that match the NuGet package version.
      - name: Install Playwright browsers
        run: |
          pwsh tests/FamilySplit.E2ETests/bin/Release/net10.0/playwright.ps1 \
            install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_CLIENT_WWWROOT: /tmp/fs-client-publish/wwwroot
        run: |
          dotnet test tests/FamilySplit.E2ETests/FamilySplit.E2ETests.csproj \
            --no-build -c Release \
            --filter "Category=E2E" \
            --logger "trx;LogFileName=e2e-results.trx" \
            --logger "console;verbosity=normal"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Test Results
          path: "**/e2e-results.trx"
          reporter: dotnet-trx

      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: "**/playwright-traces/**"
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. SAST — CodeQL static analysis
  # ─────────────────────────────────────────────────────────────────────────────
  # codeql:
  #   name: CodeQL SAST
  #   runs-on: ubuntu-latest
  #   permissions:
  #     actions: read
  #     contents: read
  #     security-events: write       # required to upload SARIF results
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Setup .NET ${{ env.DOTNET_VERSION }}
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: ${{ env.DOTNET_VERSION }}

  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v4
  #       with:
  #         languages: csharp
  #         queries: security-extended

  #     - name: Autobuild for CodeQL
  #       uses: github/codeql-action/autobuild@v4

  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v4
  #       with:
  #         category: "/language:csharp"
  #         upload: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. DEPENDENCY AUDIT — Trivy scans NuGet lock files for known CVEs
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write       # required to upload SARIF results
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache Trivy vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sh -s -- -b /usr/local/bin
          trivy --version

      - name: Generate NuGet lock files (required for Trivy fs scan)
        run: dotnet restore FamilySplit.slnx --locked-mode 2>/dev/null || dotnet restore FamilySplit.slnx

      - name: Trivy filesystem scan (NuGet dependencies)
        run: |
          trivy fs . \
            --scanners vuln \
            --format sarif \
            --output trivy-fs.sarif \
            --severity HIGH,CRITICAL \
            --cache-dir ~/.cache/trivy \
            --exit-code 0

      - name: Upload Trivy fs scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────────────
  # 8. SECRET SCANNING — Gitleaks
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history — scans every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required if this repo lives inside a GitHub
          # Organisation. For personal accounts it is not needed and can be omitted.

  # ─────────────────────────────────────────────────────────────────────────────
  # 9. LINT / FORMAT CHECK
  # ─────────────────────────────────────────────────────────────────────────────
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FamilySplit.slnx

      - name: Check formatting (dotnet format)
        run: |
          dotnet format FamilySplit.slnx \
            --verify-no-changes \
            --no-restore \
            --severity warn

  # ─────────────────────────────────────────────────────────────────────────────
  # CI STATUS — single job that deploy.yml watches
  # ─────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - client-unit-tests
      - integration-tests
      - e2e-tests
      # - codeql
      - dependency-audit
      - secret-scan
      - format-check
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more CI jobs failed: $results"
              exit 1
            fi
          done
          echo "All CI checks passed ✓"
