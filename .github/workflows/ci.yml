  #   name: CodeQL SAST
  #   runs-on: ubuntu-latest
  #   permissions:
  #     actions: read
  #     contents: read
  #     security-events: write       # required to upload SARIF results
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Setup .NET ${{ env.DOTNET_VERSION }}
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: ${{ env.DOTNET_VERSION }}

  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v4
  #       with:
  #         languages: csharp
  #         queries: security-extended

  #     - name: Autobuild for CodeQL
  #       uses: github/codeql-action/autobuild@v4

  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v4
  #       with:
  #         category: "/language:csharp"
  #         upload: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. DEPENDENCY AUDIT — Trivy scans NuGet lock files for known CVEs
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write       # required to upload SARIF results
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache Trivy vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sh -s -- -b /usr/local/bin
          trivy --version

      - name: Generate NuGet lock files (required for Trivy fs scan)
        run: dotnet restore FamilySplit.slnx --locked-mode 2>/dev/null || dotnet restore FamilySplit.slnx

      - name: Trivy filesystem scan (NuGet dependencies)
        run: |
          trivy fs . \
            --scanners vuln \
            --format sarif \
            --output trivy-fs.sarif \
            --severity HIGH,CRITICAL \
            --cache-dir ~/.cache/trivy \
            --exit-code 0

      - name: Upload Trivy fs scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. SECRET SCANNING — Gitleaks
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history — scans every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required if this repo lives inside a GitHub
          # Organisation. For personal accounts it is not needed and can be omitted.

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. LINT / FORMAT CHECK
  # ─────────────────────────────────────────────────────────────────────────────
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FamilySplit.slnx

      - name: Check formatting (dotnet format)
        run: |
          dotnet format FamilySplit.slnx \
            --verify-no-changes \
            --no-restore \
            --severity warn

  # ─────────────────────────────────────────────────────────────────────────────
  # CI STATUS — single job that deploy.yml watches
  # ─────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      # - codeql
      - dependency-audit
      - secret-scan
      - format-check
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more CI jobs failed: $results"
              exit 1
            fi
          done
          echo "All CI checks passed ✓"