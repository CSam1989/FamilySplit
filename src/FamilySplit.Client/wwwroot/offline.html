<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4F46E5" />
    <title>FamilySplit — Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: #4F46E5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f8fafc;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            max-width: 320px;
            line-height: 1.6;
        }

        .retry-btn {
            margin-top: 0.5rem;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            background: #4F46E5;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            min-height: 48px;
            transition: background 0.15s;
        }

        .retry-btn:hover { background: #4338ca; }

        .wifi-icon {
            width: 56px;
            height: 56px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 24C14 18.477 18.477 14 24 14C29.523 14 34 18.477 34 24C34 29.523 29.523 34 24 34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M24 34C21.239 34 19 31.761 19 29C19 26.239 21.239 24 24 24C26.761 24 29 26.239 29 29" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="24" cy="24" r="2" fill="white"/>
        </svg>
    </div>

    <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="2" x2="22" y2="22"/>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
        <path d="M5 13a10 10 0 0 1 5.24-2.76"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
    </svg>

    <h1>You're offline</h1>
    <p>FamilySplit needs a connection to load. Check your internet and try again.</p>

    <button class="retry-btn" onclick="window.location.reload()">Try again</button>
</body>
</html>
